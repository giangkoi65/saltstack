name: SaltStack GitOps Continuous Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy-infrastructure:
    name: Sync and Apply Infrastructure State
    runs-on: ${{ matrix.target_master }}

    strategy:
      matrix:
        target_master: [Salt, Salt2] 
      fail-fast: false # Đảm bảo nếu một Master lỗi/sập, Master còn lại vẫn tiếp tục chạy job

    steps:
      - name: 🔍 Check Current Runner Identity
        run: |
          echo "================================================="
          echo "🚀 Job is running on GitHub Runner: ${{ matrix.target_master }}"
          echo "💻 OS Hostname: $(hostname)"
          echo "================================================="

      - name: 🔄 Update Salt Fileserver Cache from Git
        run: |
          echo "📥 Updating Fileserver (States)..."
          sudo salt-run fileserver.update
          
          echo "📥 Updating External Pillar (Variables)..."
          sudo salt-run git_pillar.update

      - name: ⏳ Wait for GitFS Sync Completion
        run: sleep 5
          
      - name: 🔋 Refresh Minions Pillar Cache
        run: |
          echo "Kiểm tra xem Minion có đang kết nối tới Master này không..."
          if sudo salt '*' test.ping -t 5 | grep -q "True"; then
            echo "✅ Minion đang Active trên Node này. Tiến hành cập nhật cấu hình..."
            sudo salt '*' saltutil.refresh_pillar -t 30
          else
            echo "⏭️ Minion không phản hồi trên Node này (Đây là Passive Master). Bỏ qua bước Refresh."
          fi

      - name: 🚀 Continuous Deployment - Apply Nginx State
        run: |
          if sudo salt '*' test.ping -t 5 | grep -q "True"; then
            echo "Applying deployment..."
            sudo salt '*' state.apply nginx saltenv=main pillarenv=main queue=True -t 30
          else
            echo "⏭️ Bỏ qua Apply State trên Passive Master."
          fi

      - name: 🔄 Automatic Failback to Master 1 (Primary)
        run: |
          CURRENT_HOST=$(hostname)
          
          if sudo salt '*' test.ping -t 5 | grep -q "True"; then
            if [[ "$CURRENT_HOST" == *"master2"* ]] || [[ "$CURRENT_HOST" == *"node2"* ]]; then
              echo "⚠️ Phát hiện đây là Master 2 (Dự phòng) nhưng đang gánh Minion!"
              echo "⏳ Đang kiểm tra xem Master 1 (192.168.15.129) đã sống lại chưa..."
              
              if nc -z -w 3 192.168.15.129 4505; then
                echo "🚀 Master 1 đã ONLINE trở lại!"
                echo "🔄 Ra lệnh cho Minion tự restart ở chế độ chạy ngầm (bg=True) để quay về Master 1..."
                sudo salt '*' cmd.run 'sleep 3 && systemctl restart salt-minion' bg=True
                echo "✅ Đã phát lệnh Failback thành công. Minion sẽ về Master 1."
              else
                echo "⏭️ Master 1 vẫn đang sập. Giữ nguyên kết nối tại Master 2 để đảm bảo High Availability."
              fi
            fi
          fi
