name: SaltStack GitOps Continuous Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy-infrastructure:
    name: Orchestrate SaltStack HA Cluster
    runs-on: ubuntu-latest # Chạy trên hạ tầng cloud của GitHub, không lo sập Runner kẹt hàng đợi
    timeout-minutes: 5

    steps:
      - name: 🔑 Setup SSH Key for Deployment
        run: |
          mkdir -p ~/.ssh
          # Giải mã SSH Private Key (Bạn cần add khóa private vào GitHub Secrets với tên MASTER_SSH_PRIVATE_KEY)
          echo "${{ secrets.MASTER_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # Tắt cơ chế cảnh báo Yes/No khi kết nối SSH lần đầu và đặt Timeout kết nối là 5 giây
          echo -e "Host *\n\tStrictHostKeyChecking no\n\tConnectTimeout 5" > ~/.ssh/config

      - name: 🚀 Intelligent GitOps Routing & Execution
        run: |
          # Định nghĩa danh sách các Master kèm chính xác SSH User theo Inventory của bạn
          MASTERS=("node1@192.168.15.129" "node2@192.168.15.130")
          DEPLOY_SUCCESS=false

          for TARGET in "${MASTERS[@]}"; do
            # Tách chuỗi để lấy IP hiển thị log
            MASTER_IP=$(echo $TARGET | cut -d'@' -f2)

            echo "==================================================="
            echo "📡 Connecting to Salt Master: $MASTER_IP..."
            echo "==================================================="

            # BƯỚC 1: Kiểm tra kết nối mạng/SSH tới Host (Timeout 3 giây)
            if ! nc -z -w 3 $MASTER_IP 22; then
              echo "❌ Host $MASTER_IP sập hoàn toàn hoặc chặn SSH. Chuyển sang Node tiếp theo..."
              continue
            fi

            # BƯỚC 2: Kiểm tra xem DỊCH VỤ salt-master bên trong có sống không
            SERVICE_STATUS=$(ssh $TARGET "systemctl is-active salt-master" 2>/dev/null || echo "failed")
            if [ "$SERVICE_STATUS" != "active" ]; then
              echo "⚠️ Host $MASTER_IP Online, nhưng DỊCH VỤ salt-master ĐÃ SẬP (Trạng thái: $SERVICE_STATUS)!"
              echo "⏭️ Bỏ qua Node lỗi này, chuyển hướng sang Node dự phòng..."
              continue
            fi

            echo "✅ Dịch vụ salt-master trên $MASTER_IP đang HOẠT ĐỘNG tốt."

            # BƯỚC 3: Đồng bộ GitFS Cache
            echo "📥 Updating Fileserver & Pillar Cache on $MASTER_IP..."
            ssh $TARGET "sudo salt-run fileserver.update && sudo salt-run git_pillar.update"
            
            echo "⏳ Waiting for GitFS Sync Completion..."
            sleep 5

            # BƯỚC 4: Kiểm tra trạng thái Active/Passive của cụm thông qua kết nối Minion
            echo "🔋 Checking active Minions connection..."
            if ssh $TARGET "sudo salt '*' test.ping -t 5" | grep -q "True"; then
              echo "🎯 Minion đang ACTIVE tại $MASTER_IP. Tiến hành Apply State!"
              
              echo "🔄 Refreshing Pillar..."
              ssh $TARGET "sudo salt '*' saltutil.refresh_pillar -t 30"
              
              echo "🚀 Applying Nginx Deployment..."
              ssh $TARGET "sudo salt '*' state.apply nginx saltenv=main pillarenv=main queue=True -t 30"
              
              # BƯỚC 5: Xử lý Tự động Failback nếu đang phải chạy trên Master 2 (Dự phòng)
              if [ "$MASTER_IP" == "192.168.15.130" ]; then
                echo "⚠️ Đang chạy trên Master 2. Kiểm tra xem Master 1 (Primary) đã hồi sinh dịch vụ chưa..."
                if nc -z -w 3 192.168.15.129 4505; then
                  echo "🚀 Cổng kết nối Salt Master 1 (4505) đã ONLINE trở lại!"
                  echo "🔄 Ra lệnh cho Minion restart ngầm (bg=True) để tự động hồi chuyển về Master 1..."
                  ssh $TARGET "sudo salt '*' cmd.run 'sleep 3 && systemctl restart salt-minion' bg=True"
                  echo "✅ Đã phát lệnh Failback thành công."
                else
                  echo "⏭️ Master 1 vẫn sập. Giữ nguyên kết nối tại Master 2 để đảm bảo High Availability."
                fi
              fi

              DEPLOY_SUCCESS=true
              break # Đã tìm thấy Node Active và xử lý xong, thoát vòng lặp ngay lập tức!
            else
              echo "⏭️ Minion không phản hồi trên $MASTER_IP (Đây là Passive Master). Bỏ qua."
              DEPLOY_SUCCESS=true # Vẫn tính thành công vì hạ tầng vẫn chạy ổn định ở Node còn lại
            fi
          done

          if [ "$DEPLOY_SUCCESS" = false ]; then
            echo "🚨 THẤT BẠI: Toàn bộ cụm Salt Master hoặc dịch vụ đều đã sập!"
            exit 1
          fi
