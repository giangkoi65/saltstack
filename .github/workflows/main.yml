name: SaltStack GitOps Continuous Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy-infrastructure:
    name: Sync and Apply Infrastructure State
    runs-on: Salt

    steps:
      # Bước 1: Dùng đường dẫn tuyệt đối và tự động cập nhật cache trên CẢ HAI Master
      - name: 🔄 Update Salt Fileserver Cache on BOTH Masters
        run: |
          # 1. Luôn cập nhật trực tiếp trên con Master hiện tại đang gánh Runner này
          sudo /usr/bin/salt-run fileserver.update
          
          # 2. Tự động kiểm tra xem mình đang đứng ở Node nào để ra lệnh cho Node còn lại cập nhật qua Salt nội bộ
          CURRENT_HOST=$(hostname)
          if [ "$CURRENT_HOST" = "master-node-1" ]; then
            echo "Đang chạy trên Master 1 -> Ra lệnh cho Master 2 cập nhật cache..."
            sudo /usr/bin/salt 'master-node-2' cmd.run "sudo /usr/bin/salt-run fileserver.update"
          elif [ "$CURRENT_HOST" = "master-node-2" ]; then
            echo "Đang chạy trên Master 2 -> Ra lệnh cho Master 1 cập nhật cache..."
            sudo /usr/bin/salt 'master-node-1' cmd.run "sudo /usr/bin/salt-run fileserver.update"
          fi
          
      # Bước 2: Làm mới bộ nhớ đệm Pillar dữ liệu (Dùng đường dẫn tuyệt đối)
      - name: 🔋 Refresh Minions Pillar Cache
        run: |
          sudo /usr/bin/salt '*' saltutil.refresh_pillar

      # Bước 3: Áp đặt trạng thái CD cho Nginx (Dùng đường dẫn tuyệt đối)
      - name: 🚀 Continuous Deployment - Apply Nginx State
        run: |
          sudo /usr/bin/salt '*' state.apply nginx
