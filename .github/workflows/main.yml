name: SaltStack GitOps Continuous Deployment

# Pipeline tự động kích hoạt mỗi khi có hành động PUSH vào nhánh main
on:
  push:
    branches:
      - main

jobs:
  deploy-infrastructure:
    name: Sync and Apply Infrastructure State
    # Chỉ định chạy trên chính con máy ảo Salt Master của bạn
    runs-on: Salt

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # THÊM BƯỚC NÀY ĐỂ CHECK XEM LỖI Ở ĐÂU
      - name: 🔍 Debug Hệ Thống Runner
        run: |
          echo "=== Tên máy (Hostname) đang chạy pipeline này là: ==="
          hostname
          echo "=== User đang chạy lệnh này là: ==="
          whoami
          echo "=== Tìm vị trí thực tế của lệnh salt: ==="
          whereis salt-run
          whereis salt
          echo "=== Thử kiểm tra quyền sudo mà không có đường dẫn: ==="
          sudo -l
          
      # Bước 1: Ra lệnh cho Salt Master xóa cache cũ, kéo code mới nhất từ GitHub Repo về RAM
      - name: 🔄 Update Salt Fileserver Cache from Git
        run: |
          sudo /usr/bin/salt-run fileserver.update
          
      # Bước 2: Ra lệnh cho toàn bộ các Minion cập nhật lại bộ nhớ đệm dữ liệu Pillar
      - name: 🔋 Refresh Minions Pillar Cache
        run: |
          sudo /usr/bin/salt '*' saltutil.refresh_pillar

      # Bước 3: Thực thi áp đặt trạng thái để cập nhật Nginx (Continuous Deployment)
      - name: 🚀 Continuous Deployment - Apply Nginx State
        run: |
          sudo /usr/bin/salt '*' state.apply nginx
